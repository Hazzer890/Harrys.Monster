<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#f5f7fc">
  <title>404 — Not Found | Harry Cassidy</title>

  <!-- Favicon: h.m monogram -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%232563eb'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='JetBrains Mono,ui-monospace,monospace' font-size='30' font-weight='700' fill='%23fafafa'>h<tspan fill='%23dbeafe'>.</tspan>m</text></svg>">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark');}catch(e){}</script>
  <link rel="stylesheet" href="css/reset.css?v=3">
  <link rel="stylesheet" href="css/variables.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=3">
  <link rel="stylesheet" href="css/responsive.css?v=3">

  <!-- Page-local: the oversized error code (only consumer on the site) -->
  <style>
    .error-main {
      max-width: var(--maxw);
      margin: 0 auto;
      padding: clamp(120px, 22vh, 240px) 24px clamp(60px, 12vh, 120px);
      display: flex;
      justify-content: center;
    }
    .error-panel {
      width: 100%;
      max-width: 560px;
      padding: clamp(32px, 5vw, 60px);
      text-align: center;
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(4.5rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--ink);
      margin: 0 0 6px;
    }
    .error-title {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-weight: 600;
      line-height: 1.15;
      margin: 0 0 12px;
    }
    .error-message {
      color: var(--ink-soft);
      max-width: 42ch;
      margin: 0 auto 28px;
    }
  </style>
</head>
<body>

  <!-- SVG filter: liquid-glass refraction on the hero panel backdrop -->
  <svg class="glass-defs" aria-hidden="true" focusable="false" width="0" height="0">
    <defs>
      <filter id="glass-distortion" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.012" numOctaves="2" seed="7" result="noise"/>
        <feGaussianBlur in="noise" stdDeviation="3" result="softNoise"/>
        <feDisplacementMap in="SourceGraphic" in2="softNoise" scale="8" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Background mount: flow-field canvas + drifting gradient blobs -->
  <canvas id="field" aria-hidden="true"></canvas>
  <div class="backdrop" aria-hidden="true">
    <span class="blob blob--indigo"></span>
    <span class="blob blob--cyan"></span>
    <span class="blob blob--magenta"></span>
    <span class="grain"></span>
  </div>

  <!-- ===== HEADER / NAV ===== -->
  <header class="header">
    <nav class="nav" aria-label="Primary">
      <a href="index.html" class="nav-logo">Harry Cassidy</a>

      <ul class="nav-links">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="index.html#about" class="nav-link">About</a></li>
        <li><a href="timeline.html" class="nav-link">Experience</a></li>
        <li><a href="guides.html" class="nav-link">Guides</a></li>
        <li><a href="index.html#projects" class="nav-link">Projects</a></li>
        <li><a href="index.html#contact" class="nav-link">Contact</a></li>
      </ul>

      <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false" title="Toggle light / dark">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <a href="assets/cv.pdf" class="nav-cta" download>CV</a>

      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </header>

  <main class="error-main">
    <div class="error-panel glass reveal">
      <p class="error-code">404</p>
      <h1 class="error-title">This page wandered off</h1>
      <p class="error-message">The link may be broken or the page may have moved. Let's get you back on track.</p>
      <a href="index.html" class="btn btn-primary">Return home</a>
    </div>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="footer">
    <div class="container">
      <p>Harry Cassidy &copy; <span id="year">2026</span></p>
    </div>
  </footer>

  <script src="js/background.js?v=3" defer></script>
  <script src="js/main.js?v=3" defer></script>
</body>
</html>
