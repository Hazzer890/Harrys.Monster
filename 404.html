<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>404 — Not Found | Harry Cassidy</title>
  <meta name="theme-color" content="#fafafa">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%232563eb'/><text x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='JetBrains Mono,ui-monospace,monospace' font-size='30' font-weight='700' fill='%23fafafa'>h<tspan fill='%23dbeafe'>.</tspan>m</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/reset.css">
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/layout.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/responsive.css">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--space-8);
    }
    .error-code {
      font-family: var(--font-mono);
      font-size: clamp(4rem, 18vw, 8rem);
      font-weight: 700;
      color: var(--color-primary);
      line-height: 1;
      letter-spacing: -0.04em;
    }
    .error-message {
      font-size: var(--text-xl);
      color: var(--color-text-muted);
      margin: var(--space-4) 0 var(--space-8);
      max-width: 460px;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-code">404</div>
    <p class="error-message">This page wandered off. Let's get you back on track.</p>
    <a href="/" class="btn btn-primary">Return Home</a>
  </main>
</body>
</html>
